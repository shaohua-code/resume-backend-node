name: 自动部署后端
on:
  push:
    branches: [ main ] # 你代码推送的分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH连接服务器执行部署脚本
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            cd /www/wwwroot/resume-backend-node
            ./deploy.sh