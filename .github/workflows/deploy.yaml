name: Deploy Backend


on:
  push:
    branches:
      - main


jobs:

  deploy:

    runs-on: ubuntu-latest


    steps:

      - name: Deploy to Ubuntu Server

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.SERVER_IP }}

          username: ${{ secrets.SSH_USER }}

          key: ${{ secrets.SSH_PRIVATE_KEY }}

          port: 22 # 建议加上端口，避免默认端口异常


          script: |

            cd /var/www/resume-backend-node


            echo "开始拉取代码"

            git pull origin main


            echo "安装依赖"

            npm install

            echo "创建上传目录（独立于 Git 仓库）"

            mkdir -p /var/www/resume-uploads/pdfs /var/www/resume-uploads/assets

            chmod -R 755 /var/www/resume-uploads

            echo "重启服务"

            pm2 restart resume-backend-node


            pm2 save


            echo "部署完成"